<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-A | The Eternal Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #070707; }
        html, body { 
            margin: 0; padding: 0; width: 100%; overflow-x: hidden; 
            background: var(--dark); color: #eee; font-family: 'Courier Prime', monospace; 
            scroll-behavior: smooth;
        }

        /* INTRO */
        #intro-overlay { 
            position: fixed; inset: 0; background: black; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            cursor: pointer; transition: 1s cubic-bezier(0.85, 0, 0.15, 1); text-align: center; 
        }
        .lift-up { transform: translateY(-100%); }
        .intro-slogan { font-family: 'Special Elite'; color: #666; margin-top: 10px; font-size: 0.9rem; }

        /* NAV */
        nav { 
            position: fixed; right: 15px; top: 50%; transform: translateY(-50%); 
            display: flex; flex-direction: column; gap: 10px; z-index: 1000; opacity: 0; transition: 1s;
        }
        nav a { 
            width: 42px; height: 42px; border: 1px solid var(--gold); border-radius: 50%; 
            color: var(--gold); display: flex; justify-content: center; align-items: center; 
            font-size: 0.6rem; text-decoration: none; background: rgba(0,0,0,0.8); font-family: 'Bebas Neue'; 
        }

        section { min-height: 100vh; padding: 80px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        
        /* HOME */
        #home { justify-content: center; text-align: center; }
        #home-title { font-family: 'Bebas Neue'; color: var(--gold); font-size: clamp(5rem, 18vw, 12rem); margin: 0; line-height: 0.8; }
        .slogan { font-family: 'Special Elite'; color: #888; margin-top: 15px; font-size: 0.9rem; }
        .wali-kelas { font-size: 0.75rem; letter-spacing: 5px; color: #555; text-transform: uppercase; margin-top: 30px; }

        /* TIMELINE */
        .film-box { width: 100%; overflow: hidden; position: relative; padding: 40px 0; cursor: grab; }
        .film-box:active { cursor: grabbing; }
        .film-track { display: flex; width: max-content; gap: 30px; will-change: transform; pointer-events: none;transition:transform 0.1s linear; }
        .film-frame { width: 280px; text-align: center; flex-shrink: 0; }
        .film-frame img { width: 100%; height: 175px; object-fit: cover; border: 2px solid #333; cursor: zoom-in; pointer-events: auto; }
        .timeline-label { color: var(--gold); font-size: 0.65rem; margin-top: 10px; font-family: 'Special Elite'; opacity: 0.7; }

        /* MEMBER GRID & POLAROID */
        .member-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; width: 92%; max-width: 1000px; margin: 40px auto; }
        @media (min-width: 600px) { .member-grid { grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); } }
        .polaroid { 
            background: #fdfdfd; padding: 10px 10px 25px 10px; color: #222; 
            transform: rotate(var(--r)); transition: 0.3s; cursor: pointer; position: relative; overflow: hidden;
        }
        .polaroid img { width: 100%; height: 135px; object-fit: cover; transition: 0.3s; }
        .polaroid.active { transform: rotate(0) scale(1.08) !important; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Member Styles */
        .style-blur img { filter: blur(15px); }
        .style-lost { background: #111 !important; }
        .style-lost img { opacity: 0; }
        .style-lost::after { content: "UNSEEN"; position: absolute; top: 40%; left: 0; width: 100%; text-align: center; color: #444; font-family: 'Bebas Neue'; font-size: 1rem; }
        
        /* Revealed State */
        .revealed img { filter: blur(0); opacity: 1 !important; }
        .revealed.style-lost { background: #fdfdfd !important; }
        .revealed::after { display: none; }

        .chairman { border: 2px solid var(--gold) !important; box-shadow: 0 0 15px var(--gold); }
        .name-tag { font-family: 'Special Elite'; font-size: 0.75rem; color: inherit; margin-top: 10px; display: block; min-height: 1.2em; text-align: center; }

        /* MODALS */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9000; 
            display: none; justify-content: center; align-items: center; flex-direction: column; padding: 20px;
        }
        .tm-content { text-align: center; max-width: 90%; }
        .tm-image { max-width: 100%; max-height: 60vh; border: 2px solid #444; margin-bottom: 25px; }
        .caption-text { 
            font-family: 'Special Elite'; color: var(--gold); font-size: 1.1rem; 
            line-height: 1.6; max-width: 700px; margin: 0 auto;
            white-space: pre-wrap; word-spacing: 4px;
        }
        .profile-card { width: 290px; background: #fff; border-radius: 15px; text-align: center; color: #111; overflow: hidden; animation: pop 0.3s ease-out; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* ARCHIVE */
        .archive-grid { column-count: 2; column-gap: 10px; width: 100%; max-width: 1000px; }
        .archive-item { break-inside: avoid; margin-bottom: 10px; border: 1px solid #222; padding: 5px; }
        .archive-item img { width: 100%; filter: grayscale(1); }

        .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <audio id="bgMusic" src="music.mp3" loop></audio>
    <audio id="clickSfx" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>

    <div id="intro-overlay" onclick="startApp()">
        <h1 style="font-family:'Bebas Neue'; font-size: 8rem; color: var(--gold); margin:0;">X-A</h1>
        <p class="intro-slogan">"not all memories stay... but this one will"</p>
        <p style="font-size: 0.6rem; letter-spacing: 4px; margin-top: 50px; color: var(--gold); opacity: 0.5;">[ TAP TO ENTER ARCHIVE ]</p>
    </div>

    <nav id="mainNav">
        <a href="#home">H</a><a href="#timeline">T</a><a href="#anggota">S</a><a href="#archive">A</a>
    </nav>

    <section id="home">
        <h1 id="home-title" class="reveal">X-A</h1>
        <p class="slogan">one class, one thousand stories</p>
        <div class="wali-kelas">Wali Kelas: Pak Aziz Ali</div>
    </section>

    <section id="timeline" class="reveal">
        <h2 style="font-family:'Bebas Neue'; color:var(--gold); text-align:center; letter-spacing:4px;">THE CINEMATIC TIMELINE</h2>
        <div class="film-box" id="filmBox">
            <div class="film-track" id="tTrack"></div>
        </div>
    </section>

    <section id="anggota" class="reveal">
        <h2 style="font-family:'Bebas Neue'; color:var(--gold); text-align:center; letter-spacing:4px;">THE 43 SOULS</h2>
        <div class="member-grid" id="mGrid"></div>
    </section>

    <section id="archive" class="reveal">
        <h2 style="font-family:'Bebas Neue'; color:var(--gold); text-align:center; letter-spacing:4px;">THE FRAGMENTS</h2>
        <div class="archive-grid" id="aGrid"></div>
        <div id="end-trigger" style="height:50px; width:100%;"></div>
    </section>

    <div id="timeline-modal" class="modal" onclick="this.style.display='none'">
        <div class="tm-content" onclick="event.stopPropagation()">
            <img class="tm-image" src="" id="tm-img">
            <div class="tm-caption caption-text" id="tm-cap"></div>
            <button onclick="document.getElementById('timeline-modal').style.display='none'" style="margin-top:30px; background:none; border:1px solid var(--gold); color:var(--gold); padding:10px 25px; cursor:pointer; font-family:'Bebas Neue';">RETURN</button>
        </div>
    </div>

    <div id="profile-modal" class="modal" onclick="this.style.display='none'">
        <div class="profile-card" onclick="event.stopPropagation()">
            <div style="height:70px; background:#111;"></div>
            <img id="p-img" src="" style="width:110px; height:110px; border-radius:50%; border:4px solid #fff; margin:-55px auto 10px; object-fit:cover;">
            <div style="padding:20px;">
                <div id="p-role" style="background:var(--gold); font-size:0.65rem; padding:2px 10px; border-radius:10px; display:inline-block; font-family:'Bebas Neue'; color:#000;">MEMBER</div>
                <h3 id="p-name" style="font-family:'Bebas Neue'; font-size:2.2rem; margin:10px 0 5px;"></h3>
                <p id="p-ig" style="color:#888; font-size:0.8rem; margin-bottom:15px; font-family:'Courier Prime';">IG: @nama_ig_kamu</p>
            </div>
        </div>
    </div>

    <div id="easter-modal" class="modal" onclick="this.style.display='none'">
        <div style="padding:40px; text-align:center; max-width:600px;">
            <p id="easter-text" style="font-family:'Special Elite'; color:var(--gold); line-height:2; font-size:1.1rem; white-space: pre-wrap;"></p>
        </div>
    </div>

    <script>
        const names = ["afdhan","agung","aisyah","ajeng","alwi","alya","alya z","alysa","arasya","athaya","aurel","azfa","denaya","dimitri","elvina","fahmy","farah","feren","firman","hamdan","ibrahim","kaira","krishna","laura","lovita","meirin","meilinda","mentari","rafa","nanda","naura","pricillia","putik","putri","qisya","rania","reihan","sekar","shanum","syamsid","zico","vondra","faiz"];
        const personalData = {
  "afdhan": { ig: "@putraamfibii", role: "member" },
  "agung": { ig: "@agngarrd", role: "member" },
  "aisyah": { ig: "...", role: "member" },
  "ajeng": { ig: "@alyaa212025", role: "secretary" },
  "alwi": { ig: "@alwixaxa", role: "member" },
  "alya": { ig: "@al.ya861", role: "member" },
"alya z": { ig: "@alyaaptrrr_", role: "member" },
  "alysa": { ig: "@alysazaamira", role: "member" },
  "arasya": { ig: "@rsyxaa", role: "CHAIRMAN" },
  "athaya": { ig: "@athtrityazz", role: "member" },
  "aurel": { ig: "@aaurelrl_", role: "vice chairman" },
  "azfa": { ig: "@azffaaaa", role: "member" },
  "denaya": { ig: "...", role: "member" },
  "dimitri": { ig: "@d1mm14", role: "member" },
  "elvina": { ig: "@_vinnael", role: "member" },
  "fahmy": { ig: "@fahmyakbr_", role: "member" },
  "faiz": { ig: "@ysfa313_", role: "member" },
  "farah": { ig: "@_frhkamilaa", role: "member" },
  "feren": { ig: "@yoraassee", role: "member" },
  "firman": { ig: "@frmnnmaul_", role: "member" },
  "hamdan": { ig: "...", role: "member" },
  "ibrahim": { ig: "@sxcazddd_", role: "member" },
  "kaira": { ig: "@kaiikaiira", role: "member" },
  "krishna": { ig: "@_cloverrr7_", role: "member" },

  "laura": { ig: "?", role: "member" },
  "lovita": { ig: "@veetallpv_", role: "member" },
  "meilinda": { ig: "@meii_hdy", role: "member" },
  "meirin": { ig: "@dgirlr1n", role: "treasurer" },
  "mentari": { ig: "@mntariie_", role: "member" },
  "nanda": { ig: "@nndazzlra_", role: "member" },
  "naura": { ig: "@nrathsn", role: "treasurer" },
  "pricillia": { ig: "@pricillia_calista", role: "member" },
  "putik": { ig: "...", role: "secretary" },
  "putri": { ig: "@putriirika.r_", role: "" },
  "qisya": { ig: "@qissyaadle", role: "member" },
  "rafa": { ig: "@vzet69", role: "member" },
  "rania": { ig: "@raniaabwzr_", role: "member" },
  "reihan": { ig: "@w2.mee", role: "member" },
  "sekar": { ig: "@iyhin.s", role: "member" },
  "shanum": { ig: "@shnmsyp", role: "member" },
  "syamsid": { ig: "@zsyam150", role: "member" },
  "vondra": { ig: "@vdralizka_", role: "member" },
  "zico": { ig: "@yugo0oo_", role: "member" }
};
        
        const moments = ["Langkah pertama di ambang pintu kelas X-A.","Saat tawa pecah di tengah teriknya karyawisata.","Keringat dan teriakan dukungan di Class Meeting.","Berlari mengejar mimpi di bawah matahari pagi.","Kejutan sederhana untuk bapak wali kelas kita.","Diamnya kelas saat ujian, riuhnya saat istahat.","Panggung kreativitas yang takkan terlupakan.","Berbagi bekal, berbagi cerita, berbagi rasa.","Gugupnya presentasi, bangganya saat usai.","Ujung perjalanan yang kita sebut kenangan.","Fragmentasi waktu yang hilang di ingatan."];

        const sfx = document.getElementById('clickSfx');

        function startApp() {
            sfx.play();
            document.getElementById('intro-overlay').classList.add('lift-up');
            document.getElementById('mainNav').style.opacity = "1";
            document.getElementById('bgMusic').play();
            startAutoScroll();
            renderTimeline();
            renderMembers();
            renderArchive();
        }

        const track = document.getElementById('tTrack');
        const box = document.getElementById('filmBox');
        let isDown = false; let startX; let currentPos = 0;
        let resumeTimer; let isAutoScrolling = true;

        function renderTimeline() {
            track.innerHTML = "";
            for(let i=0; i<11; i++) {
                track.innerHTML += `<div class="film-frame"><img src="img/timeline/${i+1}.jpg" onclick="openTimeline(${i}, this.src)" onerror="this.src='https://via.placeholder.com/300x175/111/d4af37?text=MEMORY+${i+1}'"><div class="timeline-label">MEMORIES #${i+1}</div></div>`;
            }
            track.innerHTML += track.innerHTML; 
        }

        function startAutoScroll() {
            function step() { if(isAutoScrolling && !isDown) { currentPos -= 0.8; if (Math.abs(currentPos) >= track.offsetWidth / 2) currentPos = 0; track.style.transform = `translateX(${currentPos}px)`; } requestAnimationFrame(step); }
            step();
        }

        function openTimeline(idx, src) { 
    isAutoScrolling = false;  const modal = document.getElementById('timeline-modal'); document.getElementById('tm-img').src = src; modal.style.display = 'flex'; typeWriter(moments[idx], document.getElementById('tm-cap'), 50); }
        function holdTimeline(e) { isDown = true; isAutoScrolling = false; clearTimeout(resumeTimer); startX = (e.pageX || e.touches[0].pageX) - currentPos; }
        function moveTimeline(e) { if(!isDown) return; e.preventDefault(); currentPos = (e.pageX || e.touches[0].pageX) - startX; track.style.transform = `translateX(${currentPos}px)`; }
        function releaseTimeline() { isDown = false; resumeTimer = setTimeout(() => { isAutoScrolling = true; }, 1000); }

        box.addEventListener('mousedown', holdTimeline); window.addEventListener('mouseup', releaseTimeline); box.addEventListener('mousemove', moveTimeline);
        box.addEventListener('touchstart', holdTimeline, { passive: true }); box.addEventListener('touchend', releaseTimeline); box.addEventListener('touchmove', moveTimeline, { passive: false });

        function renderMembers() {
            const mGrid = document.getElementById('mGrid');
            const shuffled = [...names].sort(() => Math.random() - 0.5);
            shuffled.push("mystery-family");

            let lastWasSpecial = false;

            shuffled.forEach((name, index) => {
                const i = index + 1;
                const pol = document.createElement('div');
                pol.className = `polaroid`;
                
                let currentStyle = 'style-normal';
                
                if (name !== 'arasya' && name !== 'mystery-family') {
                    if (!lastWasSpecial && Math.random() > 0.6) {
                        currentStyle = Math.random() > 0.5 ? 'style-blur' : 'style-lost';
                        lastWasSpecial = true;
                    } else { currentStyle = 'style-normal'; lastWasSpecial = false; }
                } else if (name === 'arasya') { pol.classList.add('chairman'); lastWasSpecial = false; }
                else if (name === 'mystery-family') { currentStyle = 'style-lost'; lastWasSpecial = true; }

                pol.classList.add(currentStyle);
                pol.style.setProperty('--r', `${Math.random()*6-3}deg`);
                
                // BINGKAI 44 POLOS: Jika nama mystery-family, jangan kasih tag <img>
                if (name === 'mystery-family') {
                    pol.innerHTML = `<div id="tag-${i}" class="name-tag" style="margin-top: 60px;"></div>`;
                } else {
                    pol.innerHTML = `<img src="img/anggota/${i}.jpg" onerror="this.src='https://via.placeholder.com/150/222/d4af37?text=X-A'"><div id="tag-${i}" class="name-tag"></div>`;
                }
                
                let eeClicks = 0;

                pol.onclick = (e) => {
                    e.stopPropagation(); sfx.currentTime = 0; sfx.play();
                    if(!pol.classList.contains('revealed')) pol.classList.add('revealed');
                    document.querySelectorAll('.polaroid').forEach(p => p.classList.remove('active'));
                    pol.classList.add('active');
                    
                    const tag = document.getElementById(`tag-${i}`);
                    if (name !== 'mystery-family') {
                        if(tag.innerText === "") typeWriter(name.toUpperCase(), tag, 60);
                    } else {
                        if(tag.innerText === "") typeWriter("FAMILY", tag, 60);
                        eeClicks++;
                        if(eeClicks === 5) showEasterEgg("Mungkin kita akan berjalan di jalan yang berbeda nantinya, tapi ingatlah bahwa di ruangan X-A ini, kita pernah menjadi satu keluarga yang paling berisik dan paling bahagia.\n\nTerima kasih telah menjadi bagian dari sejarah ini.");
                    }
                };

                pol.ondblclick = () => { if (name !== 'mystery-family') openProfile(name, i, name === 'arasya'); };
                mGrid.appendChild(pol);
            });
        }

        function renderArchive() { const aGrid = document.getElementById('aGrid'); for(let i=1; i<=12; i++) { aGrid.innerHTML += `<div class="archive-item"><img src="img/archive/${i}.jpg" loading="lazy"></div>`; } }

        const observerEnd = new IntersectionObserver((entries) => { if(entries[0].isIntersecting) { setTimeout(() => { showEasterEgg("“Kalau kamu sampai di sini…\nberarti kamu benar-benar melihat semuanya.\nTerima kasih… sudah menghargai cerita ini.\n— X-A”"); }, 1000); observerEnd.unobserve(document.getElementById('end-trigger')); } }, { threshold: 1.0 });
        observerEnd.observe(document.getElementById('end-trigger'));

        function showEasterEgg(text) { const m = document.getElementById('easter-modal'); m.style.display = 'flex'; typeWriter(text, document.getElementById('easter-text'), 50); }

        function openProfile(name, id) {
    // Mencari data di personalData, kalau tidak ada pakai default
    const data = personalData[name] || { ig: `@${name}_archive`, role: "MEMBER" };
    
    document.getElementById('p-img').src = `img/anggota/${id}.jpg`;
    document.getElementById('p-name').innerText = name.toUpperCase();
    
    // Mengisi Jabatan & IG ke Modal secara otomatis
    document.getElementById('p-role').innerText = data.role;
    document.getElementById('p-ig').innerText = `IG: ${data.ig}`;
    
    document.getElementById('profile-modal').style.display = 'flex';
}

        function typeWriter(text, element, speed) { element.innerText = ""; let i = 0; function type() { if (i < text.length) { element.innerText += text.charAt(i); i++; setTimeout(type, speed); } } type(); }
        const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); }); }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
