    <style>
        :root { --gold: #d4af37; --dark: #070707; }
        html, body { 
            margin: 0; padding: 0; width: 100%; overflow-x: hidden; 
            background: var(--dark); color: #eee; font-family: 'Courier Prime', monospace; 
            scroll-behavior: smooth;
        }

        /* INTRO */
        #intro-overlay { 
            position: fixed; inset: 0; background: black; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            cursor: pointer; transition: 1s cubic-bezier(0.85, 0, 0.15, 1); text-align: center; 
        }
        .lift-up { transform: translateY(-100%); }
        .intro-slogan { font-family: 'Special Elite'; color: #666; margin-top: 10px; font-size: 0.9rem; }

        /* NAV */
        nav { 
            position: fixed; right: 15px; top: 50%; transform: translateY(-50%); 
            display: flex; flex-direction: column; gap: 10px; z-index: 1000; opacity: 0; transition: 1s;
        }
        nav a { 
            width: 42px; height: 42px; border: 1px solid var(--gold); border-radius: 50%; 
            color: var(--gold); display: flex; justify-content: center; align-items: center; 
            font-size: 0.6rem; text-decoration: none; background: rgba(0,0,0,0.8); font-family: 'Bebas Neue'; 
        }

        section { min-height: 100vh; padding: 80px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        
        /* HOME */
        #home { justify-content: center; text-align: center; }
        #home-title { font-family: 'Bebas Neue'; color: var(--gold); font-size: clamp(5rem, 18vw, 12rem); margin: 0; line-height: 0.8; }
        .slogan { font-family: 'Special Elite'; color: #888; margin-top: 15px; font-size: 0.9rem; }
        .wali-kelas { font-size: 0.75rem; letter-spacing: 5px; color: #555; text-transform: uppercase; margin-top: 30px; }

        /* TIMELINE */
        .film-box { width: 100%; overflow: hidden; position: relative; padding: 40px 0; cursor: grab; }
        .film-box:active { cursor: grabbing; }
        .film-track { display: flex; width: max-content; gap: 30px; will-change: transform; pointer-events: none;transition:transform 0.1s linear; }
        .film-frame { width: 280px; text-align: center; flex-shrink: 0; }
        .film-frame img { width: 100%; height: 175px; object-fit: cover; border: 2px solid #333; cursor: zoom-in; pointer-events: auto; }
        .timeline-label { color: var(--gold); font-size: 0.65rem; margin-top: 10px; font-family: 'Special Elite'; opacity: 0.7; }

        /* MEMBER GRID & POLAROID */
        .member-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; width: 92%; max-width: 1000px; margin: 40px auto; }
        @media (min-width: 600px) { .member-grid { grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); } }
        .polaroid { 
            background: #fdfdfd; padding: 10px 10px 25px 10px; color: #222; 
            transform: rotate(var(--r)); transition: 0.3s; cursor: pointer; position: relative; overflow: hidden;
        }
        .polaroid img { width: 100%; height: 135px; object-fit: cover; transition: 0.3s; }
        .polaroid.active { transform: rotate(0) scale(1.08) !important; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Member Styles */
        .style-blur img { filter: blur(15px); }
        .style-lost { background: #111 !important; }
        .style-lost img { opacity: 0; }
        .style-lost::after { content: "UNSEEN"; position: absolute; top: 40%; left: 0; width: 100%; text-align: center; color: #444; font-family: 'Bebas Neue'; font-size: 1rem; }
        
        /* Revealed State */
        .revealed img { filter: blur(0); opacity: 1 !important; }
        .revealed.style-lost { background: #fdfdfd !important; }
        .revealed::after { display: none; }

        /* Ganti baris .chairman yang lama dengan ini */
.polaroid.chairman {

}

/* Tambahkan ini juga agar nama Arasya jadi emas */

}

        /* MODALS */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9000; 
            display: none; justify-content: center; align-items: center; flex-direction: column; padding: 20px;

        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* ARCHIVE */
        .archive-grid { column-count: 2; column-gap: 10px; width: 100%; max-width: 1000px; }
        .archive-item { break-inside: avoid; margin-bottom: 10px; border: 1px solid #222; padding: 5px; }
        .archive-item img { width: 100%; filter: grayscale(1); }

        .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>

      // 1. DATA TIMELINE
const timelineLabels = ["DAY ONE", "lab fisika", "math teacher", "new class", "maulid", "post-dance", "teachers day", "post-drama", "munggahan", "iftar", "..."];

const moments = [
    `semuanya dimulai dari sini… masih asing, masih saling melihat`,
    `kelas pertama… masih jaim, masih belum kenal semua`,
    `antara angka dan kebingungan… kita tetap jalanin bersama`,
    `ruangan baru… tapi cerita terus berlanjut`,
    `sejenak lebih tenang… di tengah hari-hari yang ramai`,
    `capek banget… tapi seru juga`,
    `hari untuk mereka… yang sabar menghadapi kita`,
    `ga sedikit proses di balik ini… dan akhirnya selesai juga`,
    `makan bareng sebelum puasa… sesederhana itu, tapi berasa`,
    `berbuka bersama… ditemani tawa dan obrolan ringan`,
    `dan ini belum selesai… kita masih di tengah cerita`
];


// 2. VARIABEL KONTROL (PASTIKAN HANYA ADA DI SINI)
let isDown = false; 
let startX; 
let currentPos = 200; // Mulai dari 200px agar ada jarak kosong (hitam) di awal
let resumeTimer; 
let isAutoScrolling = false; 

// 3. FUNGSI START APP
function startApp() {
    const sfx = document.getElementById('clickSfx');
    const bgMusic = document.getElementById('bgMusic');
    if(bgMusic) {
        // 1. SET VOLUME AWAL (Ganti 0.4 kalau masih kekecilan)
        bgMusic.volume = 0.1; 
        bgMusic.play();

        // 2. FUNGSI MENAIKKAN VOLUME SECARA HALUS
        let targetVolume =0.3 // Volume maksimal (100%)
        let currentVol = 0.1;   // Harus sama dengan volume awal di atas
        
        const fadeIn = setInterval(() => {
            if (currentVol < targetVolume) {
                currentVol += 0.05; // Naik pelan-pelan (0.02 = 2%)
                // Pastikan tidak lebih dari 1.0 agar tidak error
                bgMusic.volume = Math.min(currentVol, 1);
            } else {
                clearInterval(fadeIn); // Berhenti jika sudah sampai target
            }
        }, 150); // Kecepatan interval (150ms = 0.15 detik)
    }
    document.getElementById('intro-overlay').classList.add('lift-up');
    document.getElementById('mainNav').style.opacity = "1";

    renderTimeline();
    renderMembers();
    renderArchive();
    startAutoScroll(); 
}

// 4. RENDER TIMELINE
function renderTimeline() {
    const track = document.getElementById('tTrack');
    if (!track) return;
    track.innerHTML = "";
    
    // Tambahkan ruang kosong di awal (Efek Mulai dari Hitam)
    track.innerHTML += `<div style="min-width: 50vw;"></div>`;

    timelineLabels.forEach((label, i) => {
        track.innerHTML += `
            <div class="film-frame">
                <img src="img/timeline/${i+1}.jpg" onclick="openTimeline(${i}, this.src)" onerror="this.src='https://via.placeholder.com/300x175/111/d4af37?text=PHOTO+${i+1}'">
                <div class="timeline-label">${label}</div> 
            </div>`;
    });
    track.innerHTML += track.innerHTML; 
}

// 5. AUTO SCROLL MESIN
function startAutoScroll() {
    const track = document.getElementById('tTrack');
    if (!track) return;
    function step() {
        if(isAutoScrolling && !isDown) {
            currentPos -= 0.8; 
            // Jika sudah lewat semua foto, reset ke posisi awal (dengan jarak hitam)
            if (Math.abs(currentPos) >= track.scrollWidth / 2) currentPos = 200;
            track.style.transform = `translateX(${currentPos}px)`;
        }
        requestAnimationFrame(step);
    }
    step();
}

// 6. FUNGSI INTERAKSI
function openTimeline(idx, src) { 
    isAutoScrolling = false;  
    const modal = document.getElementById('timeline-modal'); 
    document.getElementById('tm-img').src = src; 
    modal.style.display = 'flex'; 
    typeWriter(moments[idx], document.getElementById('tm-cap'), 50); 
}

function holdTimeline(e) { 
    isDown = true; isAutoScrolling = false; 
    clearTimeout(resumeTimer); 
    const x = (e.pageX || e.touches[0].pageX);
    startX = x - currentPos; 
}

function moveTimeline(e) { 
    if(!isDown) return; 
    e.preventDefault(); 
    const track = document.getElementById('tTrack');
    const x = (e.pageX || e.touches[0].pageX);
    currentPos = x - startX; 
    track.style.transform = `translateX(${currentPos}px)`; 
}

function releaseTimeline() { 
    isDown = false; 
    resumeTimer = setTimeout(() => { isAutoScrolling = true; }, 1000); 
}

// 7. SENSOR "TRIGGER" (JALAN PAS DI TENGAH LAYAR)
const timelineObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        const track = document.getElementById('tTrack');
        if (entry.isIntersecting) {
            isAutoScrolling = true; 
        } else {
            isAutoScrolling = false;
            currentPos = 200; // Kembalikan ke posisi awal (hitam)
            if(track) track.style.transform = `translateX(200px)`;
        }
    });
}, { threshold: 0.7 }); // Harus 70% muncul (pas di tengah) baru jalan

const timelineSection = document.getElementById('timeline');
if (timelineSection) timelineObserver.observe(timelineSection);

// 8. EVENT LISTENERS
const filmBox = document.getElementById('filmBox');
if (filmBox) {
    filmBox.addEventListener('mousedown', holdTimeline); 
    window.addEventListener('mouseup', releaseTimeline); 
    filmBox.addEventListener('mousemove', moveTimeline);
    filmBox.addEventListener('touchstart', holdTimeline, { passive: true }); 
    filmBox.addEventListener('touchend', releaseTimeline); 
    filmBox.addEventListener('touchmove', moveTimeline, { passive: false });
}



        function renderMembers() {
    const mGrid = document.getElementById('mGrid');
    const memberList = names.map((name, index) => ({ name, photoId: index + 1 }));
    const shuffled = [...memberList].sort(() => Math.random() - 0.7);
    shuffled.push({ name: "mystery-family", photoId: 44 });

    // Array untuk mengingat status kolom (karena kita punya 2 kolom di mobile)
    let prevColSpecial = [false, false]; 
    let lastInRowSpecial = false;

    shuffled.forEach((person, index) => {
        const pol = document.createElement('div');
        pol.className = `polaroid`;
        
        const col = index % 2; // 0 untuk kiri, 1 untuk kanan
        let currentStyle = 'style-normal';
        
        const isArasya = person.name.toLowerCase() === 'arasya';
        const isFamily = person.name === 'mystery-family';

        if (isArasya) {
            pol.classList.add('chairman');
            currentStyle = 'style-normal';
            lastInRowSpecial = false;
            prevColSpecial[col] = false;
        } else if (isFamily) {
            currentStyle = 'style-lost';
            // Family tidak kita hitung sebagai 'special' agar tidak merusak pola teman-teman
        } else {
            // ATURAN: Hanya boleh Special jika:
            // 1. Teman di sampingnya NORMAL ( !lastInRowSpecial )
            // 2. Teman di atasnya NORMAL ( !prevColSpecial[col] )
            if (!lastInRowSpecial && !prevColSpecial[col] && Math.random() > 0.5) {
                currentStyle = Math.random() > 0.5 ? 'style-blur' : 'style-lost';
                lastInRowSpecial = true;
                prevColSpecial[col] = true;
            } else {
                currentStyle = 'style-normal';
                lastInRowSpecial = false;
                prevColSpecial[col] = false;
            }
        }

        // Jika sudah di akhir baris (kolom kanan), reset catatan baris untuk baris baru
        if (col === 1) lastInRowSpecial = false;

        pol.classList.add(currentStyle);
        pol.style.setProperty('--r', `${Math.random()*6-3}deg`);
        
        // --- Sisanya sama dengan kode sebelumnya (InnerHTML & Onclick) ---
        if (isFamily) {
            pol.innerHTML = `<div id="tag-${person.photoId}" class="name-tag" style="margin-top: 60px;"></div>`;
        } else {
            pol.innerHTML = `<img src="img/anggota/${person.photoId}.jpg" onerror="this.src='https://via.placeholder.com/150/222/d4af37?text=X-A'"><div id="tag-${person.photoId}" class="name-tag"></div>`;
        }

        let eeClicks = 0;
        pol.onclick = (e) => {
            e.stopPropagation();
            if(typeof sfx !== 'undefined') { sfx.currentTime = 0; sfx.play(); }
            pol.classList.add('revealed');
            document.querySelectorAll('.polaroid').forEach(p => p.classList.remove('active'));
            pol.classList.add('active');
            const tag = document.getElementById(`tag-${person.photoId}`);
            if (!isFamily) {
                if(tag && tag.innerText === "") typeWriter(person.name.toUpperCase(), tag, 60);
            } else {
                if(tag && tag.innerText === "") typeWriter("FAMILY", tag, 60);
                eeClicks++;
                if(eeClicks === 5 && typeof showEasterEgg === 'function') {
                    showEasterEgg("Mungkin kita akan berjalan di jalan yang berbeda nantinya, tapi ingatlah bahwa di ruangan X-A ini, kita pernah menjadi satu keluarga yang paling berisik dan paling bahagia.");
                }
            }
        };
        pol.ondblclick = () => { if (!isFamily) openProfile(person.name, person.photoId); };
        mGrid.appendChild(pol);
    });
}






                

        function renderArchive() { const aGrid = document.getElementById('aGrid'); for(let i=1; i<=12; i++) { aGrid.innerHTML += `<div class="archive-item"><img src="img/archive/${i}.jpg" loading="lazy"></div>`; } }

        const observerEnd = new IntersectionObserver((entries) => { if(entries[0].isIntersecting) { setTimeout(() => { showEasterEgg("“Kalau kamu sampai di sini…\nberarti kamu benar-benar melihat semuanya.\nTerima kasih… sudah menghargai cerita ini.\n— HNA”"); }, 1000); observerEnd.unobserve(document.getElementById('end-trigger')); } }, { threshold: 1.0 });
        observerEnd.observe(document.getElementById('end-trigger'));

        function showEasterEgg(text) { const m = document.getElementById('easter-modal'); m.style.display = 'flex'; typeWriter(text, document.getElementById('easter-text'), 50); }

        function openProfile(name, id) {
    // Mencari data di personalData, kalau tidak ada pakai default
    const data = personalData[name] || { ig: `@${name}_archive`, role: "MEMBER" };
    
    document.getElementById('p-img').src = `img/anggota/${id}.jpg`;
    document.getElementById('p-name').innerText = name.toUpperCase();
    
    // Mengisi Jabatan & IG ke Modal secara otomatis
    document.getElementById('p-role').innerText = data.role;
    document.getElementById('p-ig').innerText = `IG: ${data.ig}`;
    
    document.getElementById('profile-modal').style.display = 'flex';

        function typeWriter(text, element, speed) { element.innerText = ""; let i = 0; function type() { if (i < text.length) { element.innerText += text.charAt(i); i++; setTimeout(type, speed); } } type(); }
